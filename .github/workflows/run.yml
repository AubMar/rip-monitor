name: RIP Monitor

on:
  schedule:
    - cron: '0 7,9,11,13,15,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run RIP monitor
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python rip_monitor.py

      - name: Save database back to repository
        run: |
          git config user.name "RIP Monitor Bot"
          git config user.email "actions@github.com"
          git add processed_notices.db
          git diff --staged --quiet || git commit -m "Update processed notices database"
          git push
